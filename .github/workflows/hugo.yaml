# 用于构建和部署Hugo网站到GitHub Pages的工作流程（已修复废弃版本）
name: 发布Hugo网站到Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.159.1      # 建议改成你本地 hugo version 显示的版本，或用 'latest'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive      # 重要！因为你用的是 git submodule（Stack 主题）
          fetch-depth: 0

      - name: 设置Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: 设置Pages
        id: pages
        uses: actions/configure-pages@v5     # 升级到 v5（推荐）

      - name: 安装Node.js依赖（如果有的话）
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: 使用Hugo构建
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3     # ← 关键修复：从 v2 改成 v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4               # ← 关键修复：从 v2 改成 v4